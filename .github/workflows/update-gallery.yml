name: Actualizar galería

on:
  push:
    paths:
      - 'assets/trabajos/**'

jobs:
  update-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar script de galería
        run: python scripts/update_gallery.py

      - name: Guardar cambios en gallery-data.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add gallery-data.json
          git diff --staged --quiet || git commit -m "Galería actualizada automáticamente"
          git push
